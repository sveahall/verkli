    command: ["npx", "tsx", "scripts/social-publish-worker.ts"]
    depends_on:
      redis:
        condition: service_healthy

  worker-notifications:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.workers
    image: verkli-worker
    container_name: verkli-worker-notifications
    restart: unless-stopped
