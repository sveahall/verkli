<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536" role="img" aria-label="Leather-bound antique journal — gothic gold-embossed cover">

  <defs>
    <linearGradient id="leatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B3D1F"/>
      <stop offset="60%" stop-color="#3A1F0F"/>
      <stop offset="100%" stop-color="#1d0e07"/>
    </linearGradient>
    <radialGradient id="leatherShade" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#9a5a31" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3A1F0F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="leatherTexture" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#3A1F0F" fill-opacity="0"/>
      <circle cx="3" cy="3" r="0.8" fill="#1a0d05" fill-opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1024" height="1536" fill="url(#leatherGrad)"/>
  <rect width="1024" height="1536" fill="url(#leatherShade)"/>
  <rect width="1024" height="1536" fill="url(#leatherTexture)"/>
  <!-- gold double-frame -->
  <rect x="64" y="80" width="896" height="1376" fill="none" stroke="#D4A55D" stroke-width="3" stroke-opacity="0.85"/>
  <rect x="80" y="96" width="864" height="1344" fill="none" stroke="#D4A55D" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- corner ornaments -->
  
    <g transform="translate(64 80) scale(1 1)">
      <path d="M0 60 L0 0 L60 0" fill="none" stroke="#D4A55D" stroke-width="2" stroke-opacity="0.85"/>
      <path d="M10 50 L50 10" fill="none" stroke="#D4A55D" stroke-width="1.2" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(960 80) scale(-1 1)">
      <path d="M0 60 L0 0 L60 0" fill="none" stroke="#D4A55D" stroke-width="2" stroke-opacity="0.85"/>
      <path d="M10 50 L50 10" fill="none" stroke="#D4A55D" stroke-width="1.2" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(64 1456) scale(1 -1)">
      <path d="M0 60 L0 0 L60 0" fill="none" stroke="#D4A55D" stroke-width="2" stroke-opacity="0.85"/>
      <path d="M10 50 L50 10" fill="none" stroke="#D4A55D" stroke-width="1.2" stroke-opacity="0.6"/>
    </g>
    <g transform="translate(960 1456) scale(-1 -1)">
      <path d="M0 60 L0 0 L60 0" fill="none" stroke="#D4A55D" stroke-width="2" stroke-opacity="0.85"/>
      <path d="M10 50 L50 10" fill="none" stroke="#D4A55D" stroke-width="1.2" stroke-opacity="0.6"/>
    </g>
  <!-- center crest: keyhole -->
  <g transform="translate(512, 645.12)">
    <circle r="120" fill="none" stroke="#D4A55D" stroke-width="2" stroke-opacity="0.7"/>
    <circle r="80" fill="none" stroke="#D4A55D" stroke-width="1.2" stroke-opacity="0.55"/>
    <path d="M-22 -30 a22 22 0 0 1 44 0 v60 h-44 z" fill="#D4A55D" fill-opacity="0.85"/>
    <circle cy="-12" r="14" fill="#3A1F0F"/>
  </g>
  <!-- spine shadow -->
  <rect x="0" y="0" width="120" height="1536" fill="black" fill-opacity="0.35"/>
  <rect x="0" y="0" width="40" height="1536" fill="black" fill-opacity="0.55"/>

</svg>
