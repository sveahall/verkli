<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" width="1024" height="1536" role="img" aria-label="Candlelight on weathered dark wood with antique pages">

  <defs>
    <radialGradient id="candleGlow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FCC997" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#E29ED5" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0a0603" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0e08"/>
      <stop offset="100%" stop-color="#0a0603"/>
    </linearGradient>
    <pattern id="grain" width="7" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 0 Q 3.5 8 0 16 Q -3.5 24 0 32 Q 3.5 40 0 48" stroke="#2a1810" stroke-width="0.8" fill="none" stroke-opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1024" height="1536" fill="url(#woodGrad)"/>
  <rect width="1024" height="1536" fill="url(#grain)"/>
  <rect width="1024" height="1536" fill="url(#candleGlow)"/>
  <!-- candle / flame in upper third -->
  <g transform="translate(512, 583.6800000000001)">
    <ellipse rx="120" ry="200" fill="#FCC997" fill-opacity="0.12"/>
    <ellipse rx="60" ry="100" fill="#FCC997" fill-opacity="0.25"/>
    <path d="M-12 -90 Q 0 -140 12 -90 Q 18 -40 0 -10 Q -18 -40 -12 -90 Z" fill="#FCC997"/>
    <path d="M-6 -70 Q 0 -100 6 -70 Q 8 -40 0 -20 Q -8 -40 -6 -70 Z" fill="#FDF8EE" fill-opacity="0.85"/>
    <!-- wax stick -->
    <rect x="-14" y="-10" width="28" height="160" fill="#FDF8EE" fill-opacity="0.85"/>
    <rect x="-14" y="-10" width="28" height="160" fill="none" stroke="#0E0B1A" stroke-opacity="0.4"/>
  </g>
  <!-- pages hint at bottom -->
  <rect x="184.32" y="1198.08" width="655.36" height="92.16" fill="#E8DBC1" fill-opacity="0.7"/>
  <rect x="184.32" y="1198.08" width="655.36" height="92.16" fill="none" stroke="#0E0B1A" stroke-opacity="0.4"/>
  <line x1="225.28" y1="1244.16" x2="798.72" y2="1244.16" stroke="#0E0B1A" stroke-opacity="0.3"/>

</svg>
