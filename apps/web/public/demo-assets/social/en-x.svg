<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="The Haunted Diary — X thumbnail">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#907AFF"/>
      <stop offset="55%" stop-color="#E29ED5"/>
      <stop offset="100%" stop-color="#FCC997"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1430"/>
      <stop offset="100%" stop-color="#0E0B1A"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#FDF8EE" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#FDF8EE" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FDF8EE" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .display {
        font-family: "Montserrat Alternates", "Inter", ui-sans-serif, system-ui, sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        font-weight: 500;
      }
    ]]></style>
  </defs>

  <!-- Brand gradient backdrop -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>
  <rect width="1200" height="675" fill="url(#orbGrad)"/>

  <!-- Cover card -->
  <rect x="300" y="87.75" width="600" height="499.5" rx="27" ry="27" fill="url(#cardGrad)" stroke="#FDF8EE" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Eyebrow -->
  <text class="body" x="600" y="197.64" text-anchor="middle" fill="#FCC997" font-size="15" letter-spacing="0.22em" style="text-transform: uppercase;">Verkli Audiobook</text>

  <!-- Title (single line; title length is bounded by the language list above) -->
  <text class="display" x="600" y="337.5" text-anchor="middle" fill="#FDF8EE" font-size="47">The Haunted Diary</text>

  <!-- Byline -->
  <text class="body" x="600" y="417.42" text-anchor="middle" fill="#FDF8EE" fill-opacity="0.78" font-size="17">by Astrid Halvorsen</text>

  <!-- CTA outside the card -->
  <text class="display" x="600" y="580.5" text-anchor="middle" fill="#0E0B1A" font-size="27">▶  Listen now</text>

  <!-- Verkli wordmark -->
  <text class="display" x="600" y="648" text-anchor="middle" fill="#0E0B1A" fill-opacity="0.78" font-size="19" letter-spacing="0.12em">VERKLI</text>

  <!-- Lang badge (top-left) -->
  <circle cx="48" cy="42.5" r="21" fill="#0E0B1A" fill-opacity="0.78"/>
  <text class="body" x="48" y="47.6" text-anchor="middle" fill="#FDF8EE" font-size="15" letter-spacing="0.06em">EN</text>

  <!-- Channel chip (top-right) -->
  <rect x="1129.7" y="27" width="43.3" height="31" rx="15.5" ry="15.5" fill="#0E0B1A" fill-opacity="0.78"/>
  <text class="body" x="1151.3500000000001" y="47.6" text-anchor="middle" fill="#FDF8EE" font-size="15" letter-spacing="0.18em">X</text>
</svg>
