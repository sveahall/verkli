name: CI

on:
  push:
    branches: [mvp]
  pull_request:
    branches: [mvp]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
  SUPABASE_URL: "https://placeholder.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
  STRIPE_SECRET_KEY: "sk_test_placeholder"
  STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
  NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
  PRICE_PLUS: "price_plus_placeholder"
  PRICE_PRO: "price_pro_placeholder"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ─── Job 1: Security ────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        id: audit
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npm audit --audit-level=moderate --omit=dev 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          {
            echo "## 🔒 npm audit"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ No known vulnerabilities found."
            else
              echo "⚠️ Vulnerabilities detected:"
              echo ""
              echo '```'
              echo "$OUTPUT"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

      - name: Secret scanning
        run: |
          echo "## 🔍 Secret Scanning" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          PATTERNS=(
            'sk_live_[a-zA-Z0-9]+'
            'sk_test_[a-zA-Z0-9]{20,}'
            'whsec_[a-zA-Z0-9]+'
            'Bearer [a-zA-Z0-9._\-]{20,}'
            'eyJhbGciOi[a-zA-Z0-9._\-]{50,}'
            'AKIA[0-9A-Z]{16}'
            'ghp_[a-zA-Z0-9]{36}'
            're_[a-zA-Z0-9]{20,}'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rPn "$pattern" apps/ packages/ --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.env*' \
              --exclude='*.test.*' --exclude='*.spec.*' --exclude='*.env.example' --exclude='node_modules/*' --exclude='package-lock.json' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND=1
              while IFS= read -r line; do
                FILE=$(echo "$line" | cut -d: -f1)
                LINE_NUM=$(echo "$line" | cut -d: -f2)
                echo "::error file=$FILE,line=$LINE_NUM::Potential secret found matching pattern: $pattern"
              done <<< "$MATCHES"
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✅ No secrets detected in source code." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Potential secrets found! See annotations above." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  # ─── Job 2: Quality ─────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check no placeholders
        run: npm run check:no-placeholders

      - name: Check no Prisma
        run: npm run check:no-prisma

      - name: ESLint
        run: npm run lint

  # ─── Job 3: Test ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: vitest
        continue-on-error: true
        run: |
          set +e
          npm run test:ci 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Generate test summary
        if: always()
        run: |
          JSON_FILE="apps/web/test-results.json"
          EXIT_CODE="${{ steps.vitest.outputs.exit_code }}"

          {
            echo "## 🧪 Test Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # If JSON exists, parse it for structured output
          if [ -f "$JSON_FILE" ]; then
            TOTAL=$(jq '.numTotalTests' "$JSON_FILE")
            PASSED=$(jq '.numPassedTests' "$JSON_FILE")
            FAILED=$(jq '.numFailedTests' "$JSON_FILE")
            SKIPPED=$(jq '.numPendingTests' "$JSON_FILE")
            DURATION_MS=$(jq '.startTime as $s | .testResults | map(.endTime) | max | . - $s' "$JSON_FILE" 2>/dev/null || echo "0")
            DURATION_S=$(( DURATION_MS / 1000 ))

            if [ "$EXIT_CODE" = "0" ]; then
              STATUS_ICON="✅"
            else
              STATUS_ICON="❌"
            fi

            {
              echo "$STATUS_ICON **$PASSED/$TOTAL passed** | $FAILED failed | $SKIPPED skipped | ${DURATION_S}s"
              echo ""
              echo "| Status | Passed | Failed | Skipped | Total |"
              echo "|--------|--------|--------|---------|-------|"
              echo "| $STATUS_ICON | $PASSED | $FAILED | $SKIPPED | $TOTAL |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            # Categorize tests
            categorize() {
              local label="$1"
              local pattern="$2"
              local tests
              tests=$(jq -r --arg pat "$pattern" '
                .testResults[]
                | select(.name | test($pat))
                | {
                    name: .name,
                    status: (if .status == "passed" then "✅" elif .status == "failed" then "❌" else "⏭️" end),
                    duration: ((.endTime - .startTime) / 1000 | tostring + "s")
                  }
                | "\(.status) \(.name | split("/") | last) (\(.duration))"
              ' "$JSON_FILE" 2>/dev/null)

              if [ -n "$tests" ]; then
                local count
                count=$(echo "$tests" | wc -l | tr -d ' ')
                {
                  echo "<details>"
                  echo "<summary><strong>$label</strong> ($count tests)</summary>"
                  echo ""
                  while IFS= read -r test_line; do
                    echo "- $test_line"
                  done <<< "$tests"
                  echo ""
                  echo "</details>"
                  echo ""
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            }

            categorize "API Tests" "/app/api/"
            categorize "Worker Tests" "/workers/"
            categorize "Security Tests" "security_"
            categorize "Utility Tests" "/lib/(sanitize|books/access|billing)"

            # Annotate failed tests
            jq -r '
              .testResults[]
              | select(.status == "failed")
              | .name as $file
              | .assertionResults[]
              | select(.status == "failed")
              | "::error file=\($file)::\(.ancestorTitles | join(" > ")) > \(.title): \(.failureMessages[0] // "assertion failed" | split("\n")[0])"
            ' "$JSON_FILE" 2>/dev/null || true

          else
            # Savage crash: no JSON file
            {
              echo "⚠️ **Test runner crashed** — no JSON output produced."
              echo ""
              echo "<details>"
              echo "<summary>Raw test output</summary>"
              echo ""
              echo '```'
              if [ -f test-output.txt ]; then
                tail -100 test-output.txt
              else
                echo "No output captured."
              fi
              echo '```'
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on test errors
        if: steps.vitest.outputs.exit_code != '0'
        run: exit 1

  # ─── Job 4: Build ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security, quality, test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build:ci

      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🏗️ Build"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -d "apps/web/.next" ]; then
            SIZE=$(du -sh apps/web/.next | cut -f1)
            PAGES=$(find apps/web/.next/server/app -name '*.html' 2>/dev/null | wc -l | tr -d ' ')
            {
              echo "✅ Build successful"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Bundle size | $SIZE |"
              echo "| Generated pages | $PAGES |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Build failed — no .next directory produced." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─── Job 5: Gate ─────────────────────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [security, quality, test, build]
    steps:
      - name: Summary
        env:
          SECURITY: ${{ needs.security.result }}
          QUALITY: ${{ needs.quality.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          icon_for() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⏭️" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "❓" ;;
            esac
          }

          {
            echo "## 📊 Pipeline Summary"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| security | $(icon_for "$SECURITY") $SECURITY |"
            echo "| quality | $(icon_for "$QUALITY") $QUALITY |"
            echo "| test | $(icon_for "$TEST") $TEST |"
            echo "| build | $(icon_for "$BUILD") $BUILD |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SECURITY" = "success" ] && [ "$QUALITY" = "success" ] && [ "$TEST" = "success" ] && [ "$BUILD" = "success" ]; then
            echo "### ✅ All checks passed!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Some checks failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
