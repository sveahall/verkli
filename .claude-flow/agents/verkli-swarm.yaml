# Verkli-Web Specialized RuFlo Swarm
# 6-agent hierarchical swarm for targeted repository analysis and improvement

version: "3.0.0"
name: verkli-web-swarm
description: Specialized swarm for verkli-web monorepo — Next.js, Supabase, security, performance, workers, refactoring

topology: hierarchical
maxAgents: 8
strategy: specialized
consensus: raft

# Queen coordinator
queen:
  name: verkli-coordinator
  role: orchestrator
  description: Coordinates all verkli specialist agents, merges findings, resolves conflicts
  capabilities:
    - task-decomposition
    - conflict-resolution
    - result-synthesis
    - priority-assignment

# Specialist agents
agents:
  - name: nextjs-architect
    role: architecture
    agentDef: .claude/agents/specialized/verkli-nextjs-architect.md
    scope: apps/web/src/app/
    priority: high
    capabilities:
      - route-analysis
      - component-review
      - middleware-audit
      - ssr-patterns

  - name: supabase-db
    role: database
    agentDef: .claude/agents/specialized/verkli-supabase-db.md
    scope:
      - apps/web/supabase/migrations/
      - apps/web/src/lib/supabase/
      - apps/web/src/types/database.ts
    priority: high
    capabilities:
      - migration-review
      - rls-audit
      - query-optimization
      - schema-validation

  - name: security-auditor
    role: security
    agentDef: .claude/agents/specialized/verkli-security-auditor.md
    scope:
      - apps/web/src/app/api/
      - apps/web/src/lib/auth/
      - apps/web/src/middleware.ts
      - apps/web/supabase/migrations/
    priority: critical
    capabilities:
      - auth-audit
      - rls-verification
      - secrets-scan
      - owasp-check

  - name: performance-optimizer
    role: performance
    agentDef: .claude/agents/specialized/verkli-performance.md
    scope: apps/web/src/
    priority: medium
    capabilities:
      - query-profiling
      - bundle-analysis
      - ssr-optimization
      - cache-strategy

  - name: worker-queues
    role: infrastructure
    agentDef: .claude/agents/specialized/verkli-worker-queues.md
    scope:
      - apps/web/src/lib/queues/
      - apps/web/scripts/
      - apps/web/src/lib/workers/
    priority: medium
    capabilities:
      - queue-audit
      - worker-review
      - redis-optimization
      - job-lifecycle

  - name: refactorer
    role: quality
    agentDef: .claude/agents/specialized/verkli-refactorer.md
    scope: apps/web/src/
    priority: low
    dependsOn:
      - nextjs-architect
      - security-auditor
      - performance-optimizer
    capabilities:
      - dead-code-removal
      - pattern-consolidation
      - file-splitting
      - consistency-enforcement

# Execution phases
phases:
  - name: analysis
    parallel: true
    agents:
      - nextjs-architect
      - supabase-db
      - security-auditor
      - performance-optimizer
      - worker-queues
    description: All specialists analyze their domains concurrently

  - name: synthesis
    parallel: false
    agents:
      - verkli-coordinator
    description: Queen merges findings, identifies cross-cutting concerns

  - name: remediation
    parallel: true
    agents:
      - refactorer
    dependsOn: synthesis
    description: Refactorer addresses issues found in analysis, prioritized by severity

# Memory namespaces
memory:
  namespace: verkli-swarm
  scopes:
    nextjs: nextjs-findings
    database: db-findings
    security: security-findings
    performance: perf-findings
    workers: worker-findings
    refactoring: refactor-queue
