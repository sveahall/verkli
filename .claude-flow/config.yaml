# RuFlo V3.5 Runtime Configuration — verkli-web
# Updated: 2026-03-27

version: "3.5.0"

swarm:
  topology: hierarchical
  maxAgents: 8
  autoScale: true
  coordinationStrategy: raft
  strategy: specialized
  antiDrift:
    enabled: true
    checkpointInterval: 5
    sharedNamespace: verkli-swarm

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 200
  learningBridge:
    enabled: true
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 10
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 5000
    similarityThreshold: 0.8
  agentScopes:
    enabled: true
    defaultScope: project

neural:
  enabled: true
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000
